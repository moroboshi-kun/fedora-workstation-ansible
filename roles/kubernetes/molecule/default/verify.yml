---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Assert kubectl is installed
      ansible.builtin.command: kubectl version --client
      changed_when: false

    - name: Assert minikube binary exists
      ansible.builtin.stat:
        path: /usr/local/bin/minikube
      register: minikube_stat

    - name: Assert minikube is present and executable
      ansible.builtin.assert:
        that:
          - minikube_stat.stat.exists
          - minikube_stat.stat.executable
